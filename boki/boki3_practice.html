<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>簿記３級 仕訳問題 50問</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo','Yu Gothic',sans-serif;background:#eef2f7;color:#2c3e50;line-height:1.5}
.wrap{max-width:980px;margin:0 auto;padding:16px}
header{background:linear-gradient(135deg,#1a3a6b,#2d6ab4);color:#fff;padding:18px 24px;border-radius:12px;margin-bottom:18px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
header h1{font-size:1.3em}
header .sub{font-size:.82em;opacity:.8;margin-top:3px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.filter-btn{padding:6px 14px;border-radius:20px;border:2px solid #2d6ab4;background:#fff;color:#2d6ab4;cursor:pointer;font-size:.83em;font-family:inherit;transition:.15s}
.filter-btn.active{background:#2d6ab4;color:#fff}
.progress{background:#fff;border-radius:8px;padding:10px 16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.08);display:flex;align-items:center;gap:14px;font-size:.88em}
.prog-bar-wrap{flex:1;background:#e0e0e0;border-radius:99px;height:10px}
.prog-bar{background:#27ae60;height:100%;border-radius:99px;transition:width .4s}
.topic-header{background:#e8edf8;border-left:4px solid #2d6ab4;padding:8px 14px;border-radius:0 6px 6px 0;margin:18px 0 10px;font-weight:bold;font-size:.92em;color:#1a3a6b}
.qblock{background:#fff;border:1px solid #dce8f8;border-radius:8px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:.2s}
.qblock.answered{border-color:#52b788}
.qblock.wrong{border-color:#e57373}
.q-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.qnum{font-weight:bold;color:#2d6ab4;white-space:nowrap;font-size:.9em}
.qtag{font-size:.75em;background:#e8edf8;color:#1a3a6b;padding:2px 8px;border-radius:10px;white-space:nowrap}
.qtext{font-size:.92em;margin-bottom:10px;line-height:1.7}
table{width:100%;border-collapse:collapse;font-size:.86em}
th{background:#2d6ab4;color:#fff;padding:6px 7px;text-align:center;white-space:nowrap}
td{border:1px solid #ccd5e0;padding:3px 4px;text-align:center}
select,input[type=number]{width:100%;padding:4px 5px;border:1px solid #b0bec5;border-radius:4px;font-size:.85em;font-family:inherit;background:#fff}
input[type=number]{text-align:right}
.ok-cell{background:#d4f0dc!important;border-color:#52b788!important}
.ng-cell{background:#fde8e8!important;border-color:#e57373!important}
.q-result{margin-top:8px;padding:7px 10px;border-radius:5px;font-size:.83em;display:none}
.q-result.ok{background:#e6f4ea;border-left:3px solid #52b788;display:block}
.q-result.ng{background:#fde8e8;border-left:3px solid #e57373;display:block}
.submit-area{text-align:center;padding:22px 0}
.btn-submit{background:#27ae60;color:#fff;border:none;padding:13px 46px;font-size:1.1em;border-radius:30px;cursor:pointer;box-shadow:0 4px 14px rgba(39,174,96,.4);transition:.2s}
.btn-submit:hover{background:#1e8449;transform:translateY(-2px)}
.btn-reset{background:#7f8c8d;color:#fff;border:none;padding:10px 26px;font-size:.95em;border-radius:20px;cursor:pointer;margin-left:12px}
.btn-hist-reset{background:#fff;color:#e74c3c;border:2px solid #e74c3c;padding:8px 16px;font-size:.85em;border-radius:20px;cursor:pointer;margin-left:10px}
.mistake-btn{border-color:#e74c3c!important;color:#e74c3c!important}
.mistake-btn.mistake-active{background:#e74c3c!important;color:#fff!important}
.hist-badge{font-size:.75em;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:bold}
.ok-badge{background:#d4f0dc;color:#1b5e20}
.ng-badge{background:#fde8e8;color:#b71c1c}
#score-panel{display:none;background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 4px 14px rgba(0,0,0,.12)}
.score-top{background:linear-gradient(135deg,#1a3a6b,#2d6ab4);color:#fff;border-radius:10px;padding:22px;text-align:center;margin-bottom:16px}
.big-score{font-size:3.5em;font-weight:bold}
.pass-msg{margin-top:8px;font-size:1em;font-weight:bold}
.score-breakdown{display:flex;flex-wrap:wrap;gap:10px}
.topic-score{flex:1;min-width:180px;background:#f8fafd;border:1px solid #dce8f8;border-radius:8px;padding:10px 12px;font-size:.85em}
.topic-score h4{color:#1a3a6b;margin-bottom:5px;font-size:.9em}
.bar-w{background:#e0e0e0;border-radius:99px;height:8px;margin:3px 0}
.bar{background:#27ae60;height:100%;border-radius:99px;transition:width .8s}
.bar.mid{background:#f39c12}
.bar.low{background:#e74c3c}
@media(max-width:640px){
  .q-top{flex-direction:column;gap:3px}
  header h1{font-size:1.1em}
  .toolbar{gap:6px}
  .filter-btn{padding:8px 12px;font-size:.82em;min-height:38px}
  .btn-submit,.btn-reset{min-height:48px;font-size:1em}
  .progress{flex-wrap:wrap;gap:6px}

  /* 仕訳テーブル：借方（左列）・貸方（右列）、科目と金額を縦並び */
  .jtable{display:block}
  .jtable thead{display:none}
  .jtable tbody{display:block}
  .jtable tbody tr{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:auto auto;
    gap:5px;
    padding:8px 0;
    border-bottom:1px solid #dce8f8;
  }
  .jtable td{border:1px solid #ccd5e0;border-radius:5px;padding:5px}
  .jtable td:nth-child(1){grid-column:1;grid-row:1}
  .jtable td:nth-child(2){grid-column:1;grid-row:2}
  .jtable td:nth-child(3){grid-column:2;grid-row:1}
  .jtable td:nth-child(4){grid-column:2;grid-row:2}
  .jtable td:nth-child(1)::before{content:'借方科目';display:block;font-size:.7em;font-weight:bold;color:#1a3a6b;margin-bottom:2px}
  .jtable td:nth-child(2)::before{content:'借方金額';display:block;font-size:.7em;font-weight:bold;color:#1a3a6b;margin-bottom:2px}
  .jtable td:nth-child(3)::before{content:'貸方科目';display:block;font-size:.7em;font-weight:bold;color:#27ae60;margin-bottom:2px}
  .jtable td:nth-child(4)::before{content:'貸方金額';display:block;font-size:.7em;font-weight:bold;color:#27ae60;margin-bottom:2px}

  /* iOSは16px未満でズームするので上書き */
  select,input[type=number]{font-size:16px!important;min-height:40px}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1>簿記３級　仕訳問題 56問</h1>
  <div class="sub">第１問対策 ／ 全範囲＋応用問題カバー ／ 各問1点・合計56点</div>
</header>

<div class="toolbar" id="filter-bar">
  <span style="font-size:.85em;font-weight:bold;color:#555">表示：</span>
</div>

<div class="progress">
  <span id="prog-text">0 / 50 問 回答済み</span>
  <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  <span id="prog-score" style="font-weight:bold;color:#27ae60">-</span>
</div>

<div id="qcontainer"></div>

<div class="submit-area">
  <button class="btn-submit" onclick="submitAll()">採　点　す　る</button>
  <button class="btn-reset" onclick="resetAll()">回答リセット</button>
  <button class="btn-hist-reset" onclick="clearHistory()">履歴リセット</button>
</div>

<div id="score-panel">
  <div class="score-top">
    <div style="font-size:.9em;opacity:.8">合計得点</div>
    <div class="big-score" id="final-score">-</div>
    <div class="pass-msg" id="pass-msg"></div>
  </div>
  <div class="score-breakdown" id="breakdown"></div>
</div>

</div><!-- /wrap -->

<script>

    '売掛金','受取手形','電子記録債権','クレジット売掛金','受取商品券','未収収益','未収入金','立替金',
    '繰越商品','貯蔵品','消耗品','前払費用','差入保証金',

  {label:'【負債】', opts:['買掛金','支払手形','電子記録債務','当座借越','借入金','未払費用','未払金','未払消費税','前受収益',
    '社会保険料預り金','所得税預り金','仮受金','仮受消費税','未払法人税等']},
  {label:'【純資産】', opts:['資本金']},

  {label:'【費用】', opts:['仕入','給料','支払家賃','水道光熱費','通信費',
    '旅費交通費','消耗品費','支払利息','支払手数料','貸倒損失','貸倒引当金繰入',
    '減価償却費','租税公課','法定福利費','修繕費','固定資産売却損','固定資産除却損','法人税等','雑損']},
  {label:'【その他】', opts:['現金過不足']},
];

function makeSelectHTML(id){
  let html=`<select id="${id}">`;
  ACC_GROUPS.forEach(g=>{
    if(g.label.startsWith('---')){ html+=`<option value="">-- 選択 --</option>`; }
    else{
      html+=`<optgroup label="${g.label}">`;
      g.opts.forEach(a=>{ html+=`<option value="${a}">${a}</option>`; });
      html+=`</optgroup>`;
    }
  });
  return html+'</select>';
}

// ===== 問題データ =====
const TOPICS = {
  A:'現金・預金',
  B:'手形',
  C:'商品売買',
  D:'売掛金・買掛金',
  E:'貸倒れ・引当金',
  F:'固定資産',
  G:'貸付金・借入金',
  H:'給料・社会保険',
  I:'仮払金・仮受金',
  J:'経過勘定',
  K:'諸費用',
  L:'資本・税金',
  M:'★応用・複合',
};

// d: 借方エントリー配列 [{a:勘定科目, v:金額}]
// c: 貸方エントリー配列
// rows: テーブル行数
const QUESTIONS = [
  // ===== A: 現金・預金 =====
  {id:1, topic:'A', rows:2,
   text:'決算にあたり、現金過不足（借方残高 ¥800）を整理した。調査の結果、¥500 は通信費の記帳漏れ、残額は原因不明であった。',
   d:[{a:'通信費',v:500},{a:'雑損',v:300}], c:[{a:'現金過不足',v:800}]},

  {id:2, topic:'A', rows:2,

   d:[{a:'旅費交通費',v:420},{a:'消耗品費',v:280},{a:'通信費',v:150}], c:[{a:'当座預金',v:850}]},

  {id:4, topic:'A', rows:2,
   text:'決算にあたり、現金過不足（貸方残高 ¥450）を整理した。¥200 は受取利息の記帳漏れと判明し、残額は原因不明であった。',
   d:[{a:'現金過不足',v:450}], c:[{a:'受取利息',v:200},{a:'雑益',v:250}]},

  // ===== B: 手形 =====
  {id:8, topic:'B', rows:1,
   text:'仕入先への買掛金 ¥200 を支払うため、得意先から受け取っていた約束手形 ¥200 を裏書譲渡した。',

   d:[{a:'当座預金',v:250}], c:[{a:'受取手形',v:250}]},

  {id:12, topic:'B', rows:1,
   text:'振り出した約束手形 ¥1,800 の満期日が到来し、当座預金から引き落とされた。',
   d:[{a:'支払手形',v:1800}], c:[{a:'当座預金',v:1800}]},

  {id:13, topic:'B', rows:2,
   text:'買掛金 ¥300 のうち ¥150 は約束手形を振り出し、残額 ¥150 は小切手を振り出して支払った。',
   d:[{a:'買掛金',v:300}], c:[{a:'支払手形',v:150},{a:'当座預金',v:150}]},

  // ===== C: 商品売買 =====
  {id:14, topic:'C', rows:2,
   text:'商品 ¥280 を掛けで仕入れ、引取運賃 ¥120 は現金で支払った。',
   d:[{a:'仕入',v:292000}], c:[{a:'買掛金',v:280},{a:'現金',v:120}]},

   d:[{a:'売掛金',v:244000}], c:[{a:'売上',v:2400},{a:'現金',v:400}]},

  {id:16, topic:'C', rows:2,
   text:'商品 ¥150 をクレジットカードで販売した。信販会社への手数料は販売代金の３%である。',
   d:[{a:'クレジット売掛金',v:145500},{a:'支払手数料',v:450}], c:[{a:'売上',v:150}]},

  {id:17, topic:'C', rows:1,
   text:'掛けで仕入れた商品のうち ¥300 を返品し、さらに残品について ¥800 の値引きを受けた。',
   d:[{a:'買掛金',v:380}], c:[{a:'仕入',v:380}]},

  {id:18, topic:'C', rows:1,
   text:'以前受け取っていた商品券 ¥800 を発行元に持参し、現金と交換した。',
   d:[{a:'現金',v:800}], c:[{a:'受取商品券',v:800}]},

  {id:19, topic:'C', rows:3,
   text:'商品 ¥450 を仕入れた。¥1,000 は現金、¥200 は約束手形を振り出し、残額は掛けとした。',
   d:[{a:'仕入',v:450}], c:[{a:'現金',v:1000},{a:'支払手形',v:200},{a:'買掛金',v:150}]},

  // ===== F: 固定資産 =====
  {id:31, topic:'F', rows:1,
   text:'建物 ¥500 を購入した。代金および仲介手数料 ¥150 はともに小切手を振り出して支払った。',

  // ===== G: 貸付金・借入金 =====
  {id:37, topic:'G', rows:1,

// ===== 履歴管理 (localStorage) =====
function loadHistory(){
  try{ return JSON.parse(localStorage.getItem('boki_history')||'{}'); }catch{ return {}; }
}
function saveHistory(h){ localStorage.setItem('boki_history',JSON.stringify(h)); }
function updateHistoryEntry(qid,isOk){
  const h=loadHistory();
  if(!h[qid]) h[qid]={attempts:0,wrong:0};
  h[qid].attempts++;
  if(!isOk) h[qid].wrong++;
  saveHistory(h);
}
function getWrongIds(){
  const h=loadHistory();
  return Object.keys(h).filter(k=>h[k].wrong>0).map(Number);
}
function clearHistory(){
  if(!confirm('間違い履歴をすべてリセットしますか？')) return;
  localStorage.removeItem('boki_history');
  mistakesOnly=false;
  renderFilterBtns();
  renderQuestions();
  updateProgress();
}

// ===== HTML生成 =====
const container = document.getElementById('qcontainer');
const filterBar  = document.getElementById('filter-bar');

const allTopics = [...new Set(QUESTIONS.map(q=>q.topic))];
const filterState = {};
allTopics.forEach(t=>filterState[t]=true);
let mistakesOnly = false;

function renderFilterBtns(){
  const wrongCount = getWrongIds().length;
  let html = `<button class="filter-btn active" id="fb-all" onclick="filterAll()">すべて</button>`;
  allTopics.forEach(t=>{
    html += `<button class="filter-btn active" id="fb-${t}" onclick="filterToggle('${t}')">${TOPICS[t]}</button>`;
  });
  html += `<button class="filter-btn mistake-btn${mistakesOnly?' mistake-active':''}" id="fb-mistakes" onclick="filterMistakes()">❌ 間違えた問題${wrongCount>0?' ('+wrongCount+')':''}</button>`;
  filterBar.innerHTML = filterBar.innerHTML.replace(/<button.*$/s,'') + html;
}

function filterToggle(t){
  if(mistakesOnly){ mistakesOnly=false; }
  filterState[t]=!filterState[t];
  renderFilterBtns();
  renderQuestions();
  updateProgress();
}
function filterAll(){
  if(mistakesOnly){
    mistakesOnly=false;
    allTopics.forEach(t=>filterState[t]=true);
  } else {
    const allOn=allTopics.every(t=>filterState[t]);
    allTopics.forEach(t=>filterState[t]=!allOn);
  }
  renderFilterBtns();
  renderQuestions();
  updateProgress();
}
function filterMistakes(){
  mistakesOnly=!mistakesOnly;
  renderFilterBtns();
  renderQuestions();
  updateProgress();
}

function getVisibleQuestions(){
  if(mistakesOnly){
    const wrongIds=getWrongIds();
    return QUESTIONS.filter(q=>wrongIds.includes(q.id));
  }
  return QUESTIONS.filter(q=>filterState[q.topic]);
}

function badgeHTML(qid){
  const h=loadHistory();
  const hist=h[qid];
  if(!hist||hist.attempts===0) return '';
  if(hist.wrong===0) return `<span class="hist-badge ok-badge">✓ 全正解</span>`;
  return `<span class="hist-badge ng-badge">✗ ${hist.wrong}/${hist.attempts}回ミス</span>`;
}

function renderQuestions(){
  container.innerHTML='';
  const visible=getVisibleQuestions();

  if(mistakesOnly && visible.length===0){
    container.innerHTML='<div style="text-align:center;padding:48px 16px;color:#888;font-size:.95em">まだ間違えた問題の記録がありません。<br>採点すると自動的に記録されます。</div>';
    return;
  }

  let prevTopic='';
  let displayNum=0;
  visible.forEach(q=>{
    displayNum++;
    if(!mistakesOnly && q.topic!==prevTopic){
      const div=document.createElement('div');
      div.className='topic-header';
      div.textContent=`▪ ${TOPICS[q.topic]}`;
      container.appendChild(div);
      prevTopic=q.topic;
    }
    const div=document.createElement('div');
    div.className='qblock';
    div.id=`qb-${q.id}`;

    let tableRows='';
    for(let r=1;r<=Math.max(q.rows,q.d.length,q.c.length,1);r++){
      tableRows+=`<tr>
        <td style="min-width:140px">${makeSelectHTML(`q${q.id}_d${r}a`)}</td>
        <td style="min-width:105px"><input type="number" id="q${q.id}_d${r}v" min="0" placeholder="0"></td>
        <td style="min-width:140px">${makeSelectHTML(`q${q.id}_c${r}a`)}</td>
        <td style="min-width:105px"><input type="number" id="q${q.id}_c${r}v" min="0" placeholder="0"></td>
      </tr>`;
    }
    div.innerHTML=`
      <div class="q-top">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="qnum">問${displayNum}（No.${q.id}）</span>
          <span class="qtag">${TOPICS[q.topic]}</span>
          ${badgeHTML(q.id)}
        </div>
      </div>
      <div class="qtext">${q.text}</div>
      <table class="jtable">
        <thead><tr><th>借方科目</th><th>借方金額</th><th>貸方科目</th><th>貸方金額</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div class="q-result" id="qr-${q.id}"></div>`;
    container.appendChild(div);
    div.querySelectorAll('select,input').forEach(el=>el.addEventListener('change',updateProgress));
  });
}

// ===== 採点ロジック =====
function norm(entries){
  return entries.filter(e=>e.a&&e.v).map(e=>e.a+'|'+e.v).sort().join('##');
}
function readEntries(qid,maxRows){
  const d=[],c=[];
  for(let r=1;r<=maxRows;r++){
    const da=document.getElementById(`q${qid}_d${r}a`),dv=document.getElementById(`q${qid}_d${r}v`);
    const ca=document.getElementById(`q${qid}_c${r}a`),cv=document.getElementById(`q${qid}_c${r}v`);
    if(da&&dv){const a=da.value,v=parseInt(dv.value)||0;if(a&&v)d.push({a,v});}
    if(ca&&cv){const a=ca.value,v=parseInt(cv.value)||0;if(a&&v)c.push({a,v});}
  }
  return{d,c};
}
function markCells(qid,maxRows,dOk,cOk){
  for(let r=1;r<=maxRows;r++){
    ['d','c'].forEach(side=>{
      const ok=side==='d'?dOk:cOk;
      [`q${qid}_${side}${r}a`,`q${qid}_${side}${r}v`].forEach(id=>{
        const el=document.getElementById(id);
        if(el){el.classList.remove('ok-cell','ng-cell');el.classList.add(ok?'ok-cell':'ng-cell');}
      });
    });
  }
}
function fmtEntry(entries){return entries.map(e=>`${e.a} ¥${e.v.toLocaleString()}`).join('、');}

function submitAll(){
  let total=0;
  const topicStats={};
  allTopics.forEach(t=>topicStats[t]={ok:0,total:0});
  const visible=getVisibleQuestions();

  visible.forEach(q=>{
    if(topicStats[q.topic]) topicStats[q.topic].total++;
    const maxRows=Math.max(q.rows,q.d.length,q.c.length,1);
    const user=readEntries(q.id,maxRows);
    const dOk=norm(user.d)===norm(q.d);
    const cOk=norm(user.c)===norm(q.c);
    const ok=dOk&&cOk;
    if(ok){total++;if(topicStats[q.topic])topicStats[q.topic].ok++;}
    markCells(q.id,maxRows,dOk,cOk);
    updateHistoryEntry(q.id,ok); // 履歴に蓄積

    const qblock=document.getElementById(`qb-${q.id}`);
    if(qblock){
      qblock.className='qblock '+(ok?'answered':'wrong');
      // バッジ更新
      const badge=qblock.querySelector('.hist-badge,.qtag~*');
      const top=qblock.querySelector('.q-top div');
      if(top){
        const existing=top.querySelector('.hist-badge');
        const newBadge=document.createElement('span');
        const h=loadHistory();const hist=h[q.id]||{attempts:0,wrong:0};
        newBadge.className='hist-badge '+(hist.wrong===0?'ok-badge':'ng-badge');
        newBadge.textContent=hist.wrong===0?'✓ 全正解':`✗ ${hist.wrong}/${hist.attempts}回ミス`;
        if(existing)existing.replaceWith(newBadge);
        else top.appendChild(newBadge);
      }
    }

    const resEl=document.getElementById(`qr-${q.id}`);
    if(resEl){
      const ansText=`【正解】借方：${fmtEntry(q.d)}　／　貸方：${fmtEntry(q.c)}`;
      resEl.className='q-result '+(ok?'ok':'ng');
      resEl.innerHTML=ok?`✓ 正解！`:`✗ 不正解　${ansText}`;
    }
  });

  renderFilterBtns(); // 間違い件数を更新

  const pct=Math.round(total/visible.length*100);
  document.getElementById('final-score').textContent=`${total} / ${visible.length}点`;
  const pm=document.getElementById('pass-msg');
  if(pct>=70){pm.textContent='✓ 合格ライン（70%以上）達成！';pm.style.color='#5efb78';}
  else{pm.textContent=`✗ あと ${Math.ceil(visible.length*0.7)-total} 問正解で合格ライン`;pm.style.color='#ff8a80';}

  let bdHTML='';
  allTopics.forEach(t=>{
    if(topicStats[t].total===0)return;
    const{ok,total:tot}=topicStats[t];
    const p=Math.round(ok/tot*100);
    bdHTML+=`<div class="topic-score"><h4>${TOPICS[t]}</h4><div>${ok} / ${tot} 問正解（${p}%）</div><div class="bar-w"><div class="bar ${p>=70?'':'mid'}" style="width:${p}%"></div></div></div>`;
  });
  document.getElementById('breakdown').innerHTML=bdHTML;
  document.getElementById('score-panel').style.display='block';
  document.getElementById('score-panel').scrollIntoView({behavior:'smooth'});
}

function updateProgress(){
  const visible=getVisibleQuestions();
  let answered=0;
  visible.forEach(q=>{
    const maxRows=Math.max(q.rows,q.d.length,q.c.length,1);
    for(let r=1;r<=maxRows;r++){
      const da=document.getElementById(`q${q.id}_d${r}a`),dv=document.getElementById(`q${q.id}_d${r}v`);
      if(da&&dv&&da.value&&(parseInt(dv.value)||0)>0){answered++;break;}
    }
  });
  const total=visible.length;
  const pct=total>0?Math.round(answered/total*100):0;
  document.getElementById('prog-text').textContent=`${answered} / ${total} 問 回答済み`;
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-score').textContent=pct+'%';
}

function resetAll(){
  if(!confirm('今回の回答をリセットしますか？（履歴は消えません）')) return;
  document.querySelectorAll('select').forEach(s=>s.selectedIndex=0);
  document.querySelectorAll('input[type=number]').forEach(i=>i.value='');
  document.querySelectorAll('.ok-cell,.ng-cell').forEach(el=>el.classList.remove('ok-cell','ng-cell'));
  document.querySelectorAll('.qblock').forEach(el=>el.className='qblock');
  document.querySelectorAll('.q-result').forEach(el=>{el.className='q-result';el.innerHTML='';});
  document.getElementById('score-panel').style.display='none';
  updateProgress();
}

// 初期描画
renderFilterBtns();
renderQuestions();
updateProgress();
</script>
